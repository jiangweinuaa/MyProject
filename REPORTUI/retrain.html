<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品批量训练 - REPORT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .action-area {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ff3344;
        }
        
        .progress-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: none;
        }
        
        .progress-section.active {
            display: block;
        }
        
        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .progress-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .progress-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .progress-item-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .progress-item-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .progress-item-value.success {
            color: #2ed573;
        }
        
        .progress-item-value.failed {
            color: #ff4757;
        }
        
        .log-section {
            background: #2d3436;
            color: #dfe6e9;
            padding: 20px;
            border-radius: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-entry.success {
            color: #2ed573;
        }
        
        .log-entry.error {
            color: #ff4757;
        }
        
        .log-entry.info {
            color: #70a1ff;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .status-running {
            background: #ffa502;
            color: white;
        }
        
        .status-completed {
            background: #2ed573;
            color: white;
        }
        
        .status-failed {
            background: #ff4757;
            color: white;
        }
        
        .status-cancelled {
            background: #747d8c;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 商品批量训练</h1>
        <p class="subtitle">重新计算所有训练库商品的特征向量，更新特征数据库</p>
        
        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalSamples">-</div>
                <div class="stat-label">训练样本总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="extractedFeatures">-</div>
                <div class="stat-label">已提取特征</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingFeatures">-</div>
                <div class="stat-label">待提取特征</div>
            </div>
        </div>
        
        <!-- 操作区域 -->
        <div class="action-area">
            <h2 style="margin-bottom: 20px; color: #333;">开始批量训练</h2>
            <p style="color: #666; margin-bottom: 20px;">
                系统将从 OSS 下载所有训练图片，使用当前配置的算法重新提取特征向量
            </p>
            <button class="btn btn-primary" id="btnStart" onclick="startTraining()">
                🚀 开始全部训练
            </button>
            <button class="btn btn-danger" id="btnCancel" onclick="cancelTraining()" style="display: none;">
                ⏹️ 取消训练
            </button>
        </div>
        
        <!-- 进度显示 -->
        <div class="progress-section" id="progressSection">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="color: #333;">训练进度</h2>
                <span class="status-badge status-running" id="statusBadge">运行中</span>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            
            <div class="progress-info">
                <div class="progress-item">
                    <div class="progress-item-label">总样本数</div>
                    <div class="progress-item-value" id="progressTotal">0</div>
                </div>
                <div class="progress-item">
                    <div class="progress-item-label">已处理</div>
                    <div class="progress-item-value" id="progressProcessed">0</div>
                </div>
                <div class="progress-item">
                    <div class="progress-item-label success">成功</div>
                    <div class="progress-item-value success" id="progressSuccess">0</div>
                </div>
                <div class="progress-item">
                    <div class="progress-item-value failed">失败</div>
                    <div class="progress-item-value failed" id="progressFailed">0</div>
                </div>
            </div>
            
            <div style="margin-top: 20px; color: #666; font-size: 14px;">
                <strong>耗时：</strong> <span id="elapsedTime">0</span> 秒
            </div>
        </div>
        
        <!-- 日志区域 -->
        <div class="progress-section" id="logSection">
            <h2 style="color: #333; margin-bottom: 15px;">训练日志</h2>
            <div class="log-section" id="logContainer">
                <div class="log-entry info">等待开始...</div>
            </div>
        </div>
    </div>
    
    <script>
        let taskId = null;
        let pollingInterval = null;
        let startTime = null;
        
        // 页面加载时获取统计数据
        window.onload = function() {
            loadStats();
        };
        
        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('http://47.100.138.89:8110/api/training/stats');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalSamples').textContent = data.productCount || 0;
                    // 这里需要根据实际 API 调整
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }
        
        // 开始训练
        async function startTraining() {
            if (!confirm('确定要开始批量训练吗？这可能需要较长时间。')) {
                return;
            }
            
            try {
                const response = await fetch('http://47.100.138.89:8110/api/training/retrain-all', {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    taskId = data.taskId;
                    document.getElementById('btnStart').disabled = true;
                    document.getElementById('btnCancel').style.display = 'inline-block';
                    document.getElementById('progressSection').classList.add('active');
                    document.getElementById('logSection').classList.add('active');
                    
                    addLog('🚀 训练任务已启动，任务 ID: ' + taskId, 'info');
                    
                    startTime = Date.now();
                    pollingInterval = setInterval(pollProgress, 2000);
                } else {
                    alert('启动训练失败：' + data.message);
                }
            } catch (error) {
                console.error('启动训练失败:', error);
                alert('启动训练失败：' + error.message);
            }
        }
        
        // 轮询进度
        async function pollProgress() {
            if (!taskId) return;
            
            try {
                const response = await fetch(`http://47.100.138.89:8110/api/training/retrain-progress/${taskId}`);
                const data = await response.json();
                
                if (data.success) {
                    updateProgress(data);
                    
                    if (data.status === 'COMPLETED' || data.status === 'FAILED' || data.status === 'CANCELLED') {
                        finishTraining(data);
                    }
                }
            } catch (error) {
                console.error('轮询进度失败:', error);
            }
        }
        
        // 更新进度显示
        function updateProgress(data) {
            const progress = data.progress || 0;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressBar').textContent = progress + '%';
            
            document.getElementById('progressTotal').textContent = data.total || 0;
            document.getElementById('progressProcessed').textContent = data.processed || 0;
            document.getElementById('progressSuccess').textContent = data.success || 0;
            document.getElementById('progressFailed').textContent = data.failed || 0;
            
            // 更新耗时
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('elapsedTime').textContent = elapsed;
            }
            
            // 更新状态徽章
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.className = 'status-badge';
            
            switch(data.status) {
                case 'RUNNING':
                    statusBadge.textContent = '运行中';
                    statusBadge.classList.add('status-running');
                    break;
                case 'COMPLETED':
                    statusBadge.textContent = '已完成';
                    statusBadge.classList.add('status-completed');
                    break;
                case 'FAILED':
                    statusBadge.textContent = '失败';
                    statusBadge.classList.add('status-failed');
                    break;
                case 'CANCELLED':
                    statusBadge.textContent = '已取消';
                    statusBadge.classList.add('status-cancelled');
                    break;
            }
        }
        
        // 训练完成
        function finishTraining(data) {
            clearInterval(pollingInterval);
            pollingInterval = null;
            
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnCancel').style.display = 'none';
            
            if (data.status === 'COMPLETED') {
                addLog('✅ 训练完成！成功：' + data.success + ', 失败：' + data.failed, 'success');
                alert('训练完成！\n成功：' + data.success + '\n失败：' + data.failed + '\n耗时：' + (data.duration / 1000) + '秒');
            } else if (data.status === 'FAILED') {
                addLog('❌ 训练失败', 'error');
                alert('训练失败！');
            } else if (data.status === 'CANCELLED') {
                addLog('⏹️ 训练已取消', 'info');
                alert('训练已取消！');
            }
            
            // 重新加载统计数据
            setTimeout(loadStats, 2000);
        }
        
        // 取消训练
        async function cancelTraining() {
            if (!confirm('确定要取消当前训练吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`http://47.100.138.89:8110/api/training/retrain-cancel/${taskId}`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.success) {
                    addLog('⏹️ 正在取消训练...', 'info');
                } else {
                    alert('取消失败：' + data.message);
                }
            } catch (error) {
                console.error('取消训练失败:', error);
                alert('取消训练失败：' + error.message);
            }
        }
        
        // 添加日志
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry ' + type;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
    </script>
</body>
</html>
