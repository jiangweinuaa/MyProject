# REPORT 服务配置文件
server:
  port: 8110
  servlet:
    context-path: /

spring:
  application:
    name: report-service
  
  # 文件上传大小配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # 数据源配置 (部署时填写)
  datasource:
    url: jdbc:oracle:thin:@//47.99.153.144:1521/posdb
    username: pos
    password: pos_2020
    driver-class-name: oracle.jdbc.OracleDriver
    # HikariCP 连接池配置
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      pool-name: ReportHikariCP
  
  # JSON 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# 日志配置
logging:
  level:
    root: INFO
    com.report: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 会话配置
conversation:
  # 对话历史最大轮数
  # 0 = 不使用对话历史（每个问题独立）
  # 3 = 保留最近 3 轮（轻量级）
  # 5 = 保留最近 5 轮（推荐）
  # 10 = 保留最近 10 轮（完整历史）
  max-history: 5
